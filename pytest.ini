[pytest]
timeout = 60
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --strict-markers
    --tb=short
markers =
    unit: Unit tests
    integration: Integration tests
    auth: Authentication tests
    ssl: SSL verification tests
    error: Error handling tests
